<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>longer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

  body {
    background: #080808;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }

  canvas#bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  #cursor-ring {
    position: fixed;
    width: 38px;
    height: 38px;
    border: 1.5px solid rgba(255,255,255,0.7);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.15s cubic-bezier(0.34,1.56,0.64,1),
                height 0.15s cubic-bezier(0.34,1.56,0.64,1);
    will-change: transform;
  }

  #cursor-ring.clicked { width: 14px; height: 14px; }

  #scene {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
    user-select: none;
  }

  .ascii-wrapper {
    position: relative;
    width: clamp(340px, 82vw, 920px);
    height: clamp(130px, 24vw, 280px);
  }

  .ascii-layer {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    white-space: pre;
    line-height: 1;
    font-size: clamp(7px, 1.08vw, 13px);
    letter-spacing: 0.05em;
    will-change: transform;
    pointer-events: none;
  }

  .layer-shadow6 { color: rgba(255,255,255,0.025); }
  .layer-shadow5 { color: rgba(255,255,255,0.04); }
  .layer-shadow4 { color: rgba(255,255,255,0.065); }
  .layer-shadow3 { color: rgba(255,255,255,0.09); }
  .layer-shadow2 { color: rgba(255,255,255,0.13); }
  .layer-shadow1 { color: rgba(255,255,255,0.20); }
  .layer-front {
    color: #f5f5f5;
    text-shadow: 0 0 20px rgba(255,255,255,0.18), 0 0 40px rgba(255,255,255,0.07);
  }

  .bottom-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .tagline {
    font-family: 'Courier New', monospace;
    font-size: clamp(11px, 1.3vw, 15px);
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: rgba(210, 210, 210, 0.5);
  }

  .discord-tag {
    font-family: 'Courier New', monospace;
    font-size: clamp(10px, 1vw, 12px);
    letter-spacing: 0.2em;
    color: rgba(120, 130, 175, 0.55);
    border: 1px solid rgba(120, 130, 175, 0.18);
    padding: 5px 14px;
    border-radius: 3px;
  }

  .discord-tag::before { content: '@ '; color: rgba(114, 137, 218, 0.55); }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 5;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.035) 2px, rgba(0,0,0,0.035) 4px
    );
    pointer-events: none;
    z-index: 6;
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="cursor-ring"></div>

<div id="scene">
  <div class="ascii-wrapper" id="asciiWrapper"></div>
  <div class="bottom-section">
    <div class="tagline">bring back a2</div>
    <div class="discord-tag">longerusername</div>
  </div>
</div>

<script>
const ASCII = ` \u2588\u2588\u2557      \u2588\u2588\u2588\u2588\u2588\u2588\u2557 \u2588\u2588\u2588\u2557   \u2588\u2588\u2557 \u2588\u2588\u2588\u2588\u2588\u2588\u2557 \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2557\u2588\u2588\u2588\u2588\u2588\u2588\u2557 
 \u2588\u2588\u2551     \u2588\u2588\u2554\u2550\u2550\u2550\u2588\u2588\u2557\u2588\u2588\u2588\u2588\u2557  \u2588\u2588\u2551\u2588\u2588\u2554\u2550\u2550\u2550\u2550\u255d \u2588\u2588\u2554\u2550\u2550\u2550\u2550\u255d\u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557
 \u2588\u2588\u2551     \u2588\u2588\u2551   \u2588\u2588\u2551\u2588\u2588\u2554\u2588\u2588\u2557 \u2588\u2588\u2551\u2588\u2588\u2551  \u2588\u2588\u2588\u2557\u2588\u2588\u2588\u2588\u2588\u2557  \u2588\u2588\u2588\u2588\u2588\u2588\u2554\u255d
 \u2588\u2588\u2551     \u2588\u2588\u2551   \u2588\u2588\u2551\u2588\u2588\u2551\u255a\u2588\u2588\u2557\u2588\u2588\u2551\u2588\u2588\u2551   \u2588\u2588\u2551\u2588\u2588\u2554\u2550\u2550\u255d  \u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557
 \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2557\u255a\u2588\u2588\u2588\u2588\u2588\u2588\u2554\u255d\u2588\u2588\u2551 \u255a\u2588\u2588\u2588\u2588\u2551\u255a\u2588\u2588\u2588\u2588\u2588\u2588\u2554\u255d\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2557\u2588\u2588\u2551  \u2588\u2588\u2551
 \u255a\u2550\u2550\u2550\u2550\u2550\u2550\u255d \u255a\u2550\u2550\u2550\u2550\u2550\u255d \u255a\u2550\u255d  \u255a\u2550\u2550\u2550\u255d \u255a\u2550\u2550\u2550\u2550\u2550\u255d \u255a\u2550\u2550\u2550\u2550\u2550\u2550\u255d\u255a\u2550\u255d  \u255a\u2550\u255d`;

const LAYERS = [
  { cls: 'layer-shadow6', depth: 6 },
  { cls: 'layer-shadow5', depth: 5 },
  { cls: 'layer-shadow4', depth: 4 },
  { cls: 'layer-shadow3', depth: 3 },
  { cls: 'layer-shadow2', depth: 2 },
  { cls: 'layer-shadow1', depth: 1 },
  { cls: 'layer-front',   depth: 0 },
];

const wrapper = document.getElementById('asciiWrapper');
const layerEls = LAYERS.map(l => {
  const el = document.createElement('pre');
  el.className = 'ascii-layer ' + l.cls;
  el.textContent = ASCII;
  wrapper.appendChild(el);
  return el;
});

// Cursor
const ring = document.getElementById('cursor-ring');
let mx = window.innerWidth / 2, my = window.innerHeight / 2;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
document.addEventListener('mousedown', () => ring.classList.add('clicked'));
document.addEventListener('mouseup',   () => ring.classList.remove('clicked'));

document.addEventListener('mousemove', e => {
  ring.style.left = e.clientX + 'px';
  ring.style.top  = e.clientY + 'px';
});

// Parallax
let tX = 0, tY = 0, cX = 0, cY = 0;
document.addEventListener('mousemove', e => {
  tX = (e.clientX / window.innerWidth  - 0.5) * 2;
  tY = (e.clientY / window.innerHeight - 0.5) * 2;
});

const scene = document.getElementById('scene');

(function parallaxLoop() {
  cX += (tX - cX) * 0.055;
  cY += (tY - cY) * 0.055;

  LAYERS.forEach((l, i) => {
    const d = l.depth;
    // shadow layers offset in the opposite direction, simulating extruded 3D text
    const px = cX * 16 - d * (2.4 + Math.abs(cX) * 1.4);
    const py = cY * 10 - d * (1.6 + Math.abs(cY) * 0.9);
    layerEls[i].style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;
  });

  scene.style.transform =
    `perspective(900px) rotateY(${cX * 4}deg) rotateX(${-cY * 2.5}deg)`;

  requestAnimationFrame(parallaxLoop);
})();

// Background canvas
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; buildGrid(); }
window.addEventListener('resize', resize);

const COLS = 30, ROWS = 20;
let dots = [];
function buildGrid() {
  dots = [];
  for (let r = 0; r <= ROWS; r++)
    for (let c = 0; c <= COLS; c++)
      dots.push({ bx: (c/COLS)*W, by: (r/ROWS)*H, x:0, y:0, base: Math.random()*0.22+0.05 });
}
resize();

let t = 0;
(function draw() {
  t += 0.008;

  ctx.fillStyle = '#080808';
  ctx.fillRect(0,0,W,H);

  // Dot grid with cursor influence
  const INFL = Math.min(W,H)*0.35;
  dots.forEach(d => {
    const ox = d.bx + Math.sin(t*0.7 + d.bx*0.004)*7;
    const oy = d.by + Math.cos(t*0.5 + d.by*0.003)*5;
    const dx = ox-mx, dy = oy-my;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const pull = Math.max(0, 1-dist/INFL);
    d.x = ox + dx*pull*0.22;
    d.y = oy + dy*pull*0.22;
    const alpha = d.base + pull*0.4;
    const rad   = 0.85 + pull*2.5;
    ctx.beginPath();
    ctx.arc(d.x, d.y, rad, 0, Math.PI*2);
    ctx.fillStyle = `rgba(175,182,215,${alpha})`;
    ctx.fill();
  });

  // Grid lines
  ctx.lineWidth = 0.5;
  for (let r=0; r<=ROWS; r++) {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(90,100,135,0.05)`;
    for (let c=0; c<=COLS; c++) { const d=dots[r*(COLS+1)+c]; c===0?ctx.moveTo(d.x,d.y):ctx.lineTo(d.x,d.y); }
    ctx.stroke();
  }
  for (let c=0; c<=COLS; c++) {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(90,100,135,0.05)`;
    for (let r=0; r<=ROWS; r++) { const d=dots[r*(COLS+1)+c]; r===0?ctx.moveTo(d.x,d.y):ctx.lineTo(d.x,d.y); }
    ctx.stroke();
  }

  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
